name: Snapshot IG · full daily

# Cattura completa una volta al giorno: profilo, totali, audience + tutti i 30 post.
# 22:00 UTC = 23:00 Italia (CET) / 24:00 Italia (CEST). Dopo l'orario di
# pubblicazione tipico, cattura ciò che è cresciuto nel corso della giornata.

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:  # trigger manuale dalla UI GitHub

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ig-dashboard/package-lock.json

      - name: Install
        working-directory: ig-dashboard
        run: npm ci

      - name: Run full snapshot
        working-directory: ig-dashboard
        env:
          IG_PAGE_TOKEN: ${{ secrets.IG_PAGE_TOKEN }}
          IG_PAGE_ID: ${{ secrets.IG_PAGE_ID }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node scripts/snapshot.js
