name: Snapshot IG · fresh hourly

# Cattura ad alta risoluzione SOLO dei post pubblicati negli ultimi 7 giorni
# + upsert orario su daily_snapshot del giorno in corso (range mezzanotte
# Rome → ora). 24 run/giorno = ~168 punti di curva nella prima settimana di
# vita di un reel + reach account-level aggiornato ogni ora invece che 1×.
# Costo Turso/Meta: trascurabile (vedi ADR 002).
# I post fermi (>7gg) non ricevono snapshot (filtro lato script).

on:
  schedule:
    # 5 minuti dopo l'ora, ogni ora UTC. Offset per non collidere col daily.
    - cron: '5 * * * *'
  workflow_dispatch:

jobs:
  snapshot-fresh:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ig-dashboard/package-lock.json

      - name: Install
        working-directory: ig-dashboard
        run: npm ci

      - name: Run fresh-only snapshot
        working-directory: ig-dashboard
        env:
          IG_PAGE_TOKEN: ${{ secrets.IG_PAGE_TOKEN }}
          IG_PAGE_ID: ${{ secrets.IG_PAGE_ID }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node scripts/snapshot.js --fresh-only
